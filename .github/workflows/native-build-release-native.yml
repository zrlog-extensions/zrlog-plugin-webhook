name: build release native
on:
  push:
    branches:
      - main
jobs:
  build:
    name: plugin relase package ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    concurrency:
      group: deploy-on-${{ matrix.os }}-native   # 同一个 group 的任务会排队执行
      cancel-in-progress: true # 取消前一个任务

    strategy:
      matrix:
        os: [ ubuntu-22.04,ubuntu-24.04-arm,macos-15-intel,macos-14,windows-2022 ]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Build and upload binary
        run: |
          bash -e bin/package-native-github.sh /tmp/download/plugin
          bash -e bin/upload-bin.sh ${{ secrets.SECRET_ID }} ${{ secrets.SECRET_KEY }} ${{ secrets.BUCKET }} /tmp/download plugin ${{ secrets.HOST }}
